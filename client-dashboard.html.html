<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Store - Client Panel</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            position: relative;
            width: 250px;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 13px;
        }

        .search-box input:focus {
            border-color: #667eea;
            outline: none;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-icon i {
            font-size: 22px;
            color: #667eea;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            font-size: 11px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Section Title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 15px;
        }

        .section-title i {
            font-size: 20px;
            color: #667eea;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #f0f0f0;
        }

        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .category-card img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .category-card span {
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #f0f0f0;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        .product-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff4757;
            color: white;
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 1;
        }

        .client-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: #ff6b6b;
            color: white;
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 1;
        }

        .product-image-container {
            width: 100%;
            height: 140px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .product-price {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .original-price {
            color: #999;
            text-decoration: line-through;
            font-size: 11px;
        }

        .final-price {
            color: #667eea;
            font-size: 16px;
            font-weight: 700;
        }

        .discount-badge {
            background: #ff4757;
            color: white;
            padding: 2px 5px;
            border-radius: 8px;
            font-size: 9px;
        }

        .product-stock {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .stock-in {
            background: #00b894;
            color: white;
        }

        .stock-out {
            background: #ff4757;
            color: white;
        }

        .product-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .product-actions button {
            padding: 6px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-order {
            background: #00b894;
            color: white;
        }

        /* Client Product Section */
        .client-section {
            background: #fff3e0;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            border: 2px solid #ff6b6b;
        }

        .client-section h3 {
            font-size: 18px;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .price-tag {
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 3px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
        }

        .form-group textarea {
            height: 60px;
            resize: vertical;
        }

        /* JazzCash Verification */
        .jazzcash-section {
            background: #f0f8ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .jazzcash-number {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #667eea;
            border: 2px dashed #667eea;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .verification-options {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .verification-option {
            flex: 1;
        }

        .verification-option input[type="radio"] {
            display: none;
        }

        .verification-option label {
            display: block;
            padding: 10px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        .verification-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .transaction-id {
            display: none;
        }

        .transaction-id.show {
            display: block;
        }

        .transaction-id input {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* Client Products Grid */
        .client-products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .client-product-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 3px solid #ff6b6b;
        }

        .client-product-card.verified {
            border-left: 3px solid #00b894;
        }

        .verification-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin: 0 auto 5px;
        }

        .status-verified {
            background: #00b894;
        }

        .status-pending {
            background: #ffc107;
        }

        .client-product-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 5px;
        }

        .client-product-card h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .client-product-card .price {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 700;
        }

        .client-product-card .seller {
            font-size: 10px;
            color: #666;
            margin: 5px 0;
        }

        .client-product-card button {
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                width: 100%;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1><i class="fas fa-store"></i> GM Store - Client Panel</h1>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search products..." id="searchInput" onkeyup="searchProduct(this.value)">
            </div>

            <div class="cart-icon" onclick="viewCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <!-- Categories -->
        <div class="section-title">
            <i class="fas fa-th-large"></i>
            <h2>Categories</h2>
        </div>
        <div id="categoriesGrid" class="categories-grid"></div>

        <!-- Products -->
        <div class="section-title">
            <i class="fas fa-boxes"></i>
            <h2>Products</h2>
        </div>
        <div id="productsGrid" class="products-grid"></div>

        <!-- Client Product Section -->
        <div class="client-section">
            <h3><i class="fas fa-hand-holding-usd"></i> Sell Your Product</h3>
            <div class="price-tag">Rs 100 only</div>

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="sellerName">
            </div>
            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="text" id="sellerPhone">
            </div>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="productDesc" rows="2"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Price (PKR)</label>
                    <input type="number" id="productPrice">
                </div>
                <div class="form-group">
                    <label>Discount %</label>
                    <input type="number" id="productDiscount" value="0">
                </div>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="productStock" value="1">
            </div>
            <div class="form-group">
                <label>Images (Max 3)</label>
                <input type="file" id="productImages" multiple>
            </div>

            <!-- JazzCash Verification -->
            <div class="jazzcash-section">
                <div style="font-weight: 600; margin-bottom: 10px;">
                    <i class="fas fa-mobile-alt"></i> JazzCash Payment Required
                </div>
                <div class="jazzcash-number">03436065243</div>
                
                <div class="verification-options">
                    <div class="verification-option">
                        <input type="radio" name="paymentVerify" id="verifyYes" value="yes" onclick="toggleTransactionId(true)">
                        <label for="verifyYes">✅ I have sent payment</label>
                    </div>
                    <div class="verification-option">
                        <input type="radio" name="paymentVerify" id="verifyNo" value="no" onclick="toggleTransactionId(false)" checked>
                        <label for="verifyNo">❌ Not yet</label>
                    </div>
                </div>

                <div class="transaction-id" id="transactionIdDiv">
                    <input type="text" id="transactionId" placeholder="Enter JazzCash Transaction ID" onkeyup="checkTransactionId()">
                </div>

                <div id="verificationStatus"></div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="submitClientProduct()" disabled>
                Pay Rs 100 & List Product
            </button>
        </div>

        <!-- Client Products -->
        <div class="section-title">
            <i class="fas fa-users"></i>
            <h2>Products by Clients</h2>
        </div>
        <div id="clientProductsGrid" class="client-products-grid"></div>
    </div>

    <!-- Modals -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeOrderModal()">✕</div>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <script>
        // ==================== SHARED DATA ====================
        let products = JSON.parse(localStorage.getItem('gm_products')) || [];
        let clientProducts = JSON.parse(localStorage.getItem('gm_client_products')) || [];
        let categories = JSON.parse(localStorage.getItem('gm_categories')) || {
            'Electronics': 'https://cdn-icons-png.flaticon.com/512/3659/3659898.png',
            'Fashion': 'https://cdn-icons-png.flaticon.com/512/6174/6174039.png',
            'Home': 'https://cdn-icons-png.flaticon.com/512/2543/2543366.png',
            'Sports': 'https://cdn-icons-png.flaticon.com/512/2965/2965275.png',
            'Client Products': 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
        };
        let orders = JSON.parse(localStorage.getItem('gm_orders')) || [];
        let cart = JSON.parse(localStorage.getItem('gm_cart')) || [];

        // ==================== INITIALIZATION ====================
        function init() {
            renderCategories();
            renderProducts();
            renderClientProducts();
            updateCartCount();
        }

        // ==================== TOGGLE TRANSACTION ID ====================
        function toggleTransactionId(show) {
            let transDiv = document.getElementById('transactionIdDiv');
            let submitBtn = document.getElementById('submitBtn');
            
            if (show) {
                transDiv.classList.add('show');
                submitBtn.disabled = true;
            } else {
                transDiv.classList.remove('show');
                submitBtn.disabled = true;
                document.getElementById('verificationStatus').innerHTML = '';
            }
        }

        function checkTransactionId() {
            let transId = document.getElementById('transactionId').value.trim();
            let submitBtn = document.getElementById('submitBtn');
            let statusDiv = document.getElementById('verificationStatus');
            
            if (transId.length > 0) {
                submitBtn.disabled = false;
                statusDiv.innerHTML = '<span style="color: #00b894; font-size: 12px;">✓ Verified! You can submit now.</span>';
            } else {
                submitBtn.disabled = true;
                statusDiv.innerHTML = '<span style="color: #ff4757; font-size: 12px;">✗ Enter transaction ID</span>';
            }
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderCategories() {
            let grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';

            for (let cat in categories) {
                grid.innerHTML += `
                    <div class="category-card" onclick="filterByCategory('${cat}')">
                        <img src="${categories[cat]}" alt="${cat}">
                        <span>${cat}</span>
                    </div>
                `;
            }
        }

        function renderProducts(filtered = null) {
            let grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            let productsToRender = filtered || products;

            productsToRender.forEach((p, i) => {
                let finalPrice = p.price - (p.price * (p.discount || 0) / 100);
                let stockClass = p.stock > 0 ? 'stock-in' : 'stock-out';
                let stockText = p.stock > 0 ? 'In Stock' : 'Out of Stock';

                grid.innerHTML += `
                    <div class="product-card">
                        ${p.discount > 0 ? `<div class="product-badge">-${p.discount}%</div>` : ''}
                        <div class="product-image-container">
                            <img src="${p.images[0] || 'https://via.placeholder.com/180x140'}" class="product-image">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div class="product-price">
                                ${p.discount > 0 ? `<span class="original-price">Rs ${p.price}</span>` : ''}
                                <span class="final-price">Rs ${finalPrice}</span>
                            </div>
                            <div class="product-stock ${stockClass}">${stockText}</div>
                            <div class="product-actions">
                                <button class="btn-view" onclick="viewProduct(${i})"><i class="fas fa-eye"></i> View</button>
                                <button class="btn-order" onclick="showOrderForm(${i}, 'store')"><i class="fab fa-whatsapp"></i> Order</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderClientProducts() {
            let grid = document.getElementById('clientProductsGrid');
            grid.innerHTML = '';

            if (clientProducts.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1/-1;">No client products yet.</p>';
                return;
            }

            clientProducts.forEach((p, i) => {
                let finalPrice = p.price - (p.price * (p.discount || 0) / 100);
                let verified = p.verified || false;
                let statusClass = verified ? 'status-verified' : 'status-pending';
                let cardClass = verified ? 'verified' : '';

                grid.innerHTML += `
                    <div class="client-product-card ${cardClass}">
                        <div class="verification-status ${statusClass}"></div>
                        <img src="${p.images[0] || 'https://via.placeholder.com/60x60'}" alt="${p.name}">
                        <h4>${p.name}</h4>
                        <div class="price">Rs ${finalPrice}</div>
                        <div class="seller">${p.sellerName}</div>
                        <button onclick="viewClientProduct(${i})"><i class="fas fa-eye"></i> View</button>
                    </div>
                `;
            });
        }

        // ==================== SUBMIT CLIENT PRODUCT ====================
        function submitClientProduct() {
            let verifyYes = document.getElementById('verifyYes').checked;
            let transactionId = document.getElementById('transactionId').value.trim();
            
            if (!verifyYes) {
                Swal.fire({
                    icon: 'error',
                    title: 'Payment Required',
                    text: 'Please confirm payment to JazzCash 03436065243'
                });
                return;
            }

            if (!transactionId) {
                Swal.fire({
                    icon: 'error',
                    title: 'Transaction ID Required',
                    text: 'Please enter your JazzCash transaction ID'
                });
                return;
            }

            let sellerName = document.getElementById('sellerName').value.trim();
            let sellerPhone = document.getElementById('sellerPhone').value.trim();
            let productName = document.getElementById('productName').value.trim();
            let productDesc = document.getElementById('productDesc').value.trim();
            let productPrice = parseFloat(document.getElementById('productPrice').value);
            let productDiscount = parseFloat(document.getElementById('productDiscount').value) || 0;
            let productStock = parseInt(document.getElementById('productStock').value) || 1;
            let files = document.getElementById('productImages').files;

            if (!sellerName || !sellerPhone || !productName || !productDesc || !productPrice) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Please fill all fields'
                });
                return;
            }

            let images = [];
            if (files.length > 0) {
                for (let i = 0; i < Math.min(files.length, 3); i++) {
                    images.push(URL.createObjectURL(files[i]));
                }
            } else {
                images.push('https://via.placeholder.com/200x200?text=Product');
            }

            // Add to client products
            clientProducts.push({
                sellerName,
                sellerPhone,
                name: productName,
                description: productDesc,
                price: productPrice,
                discount: productDiscount,
                stock: productStock,
                images,
                transactionId,
                verified: false,
                createdAt: new Date().toISOString()
            });

            // Send to FormSpree
            let formData = new FormData();
            formData.append('name', sellerName);
            formData.append('phone', sellerPhone);
            formData.append('product', productName);
            formData.append('price', productPrice);
            formData.append('transactionId', transactionId);
            formData.append('time', new Date().toLocaleString());

            fetch('https://formspree.io/f/xkoqnkze', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    saveAll();
                    clearForm();
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: 'Product submitted! Admin will verify soon.'
                    });
                }
            }).catch(error => {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Something went wrong'
                });
            });
        }

        function clearForm() {
            document.getElementById('sellerName').value = '';
            document.getElementById('sellerPhone').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDiscount').value = '0';
            document.getElementById('productStock').value = '1';
            document.getElementById('productImages').value = '';
            document.getElementById('verifyNo').checked = true;
            document.getElementById('transactionIdDiv').classList.remove('show');
            document.getElementById('transactionId').value = '';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('verificationStatus').innerHTML = '';
        }

        // ==================== VIEW FUNCTIONS ====================
        function viewProduct(index) {
            let p = products[index];
            let finalPrice = p.price - (p.price * (p.discount || 0) / 100);

            let imagesHtml = p.images.map(img => 
                `<img src="${img}" style="width:100%; margin-bottom:5px; border-radius:5px;">`
            ).join('');

            Swal.fire({
                title: p.name,
                html: `
                    ${imagesHtml}
                    <p style="text-align:left;">${p.description}</p>
                    <p><strong>Price:</strong> Rs ${finalPrice}</p>
                    <p><strong>Stock:</strong> ${p.stock}</p>
                `,
                showCancelButton: true,
                confirmButtonText: 'Order Now',
                cancelButtonText: 'Close'
            }).then((result) => {
                if (result.isConfirmed) {
                    showOrderForm(index, 'store');
                }
            });
        }

        function viewClientProduct(index) {
            let p = clientProducts[index];
            let finalPrice = p.price - (p.price * (p.discount || 0) / 100);
            let verified = p.verified ? '✅ Verified' : '⏳ Pending Verification';

            Swal.fire({
                title: p.name,
                html: `
                    <img src="${p.images[0]}" style="width:100%; max-height:200px; object-fit:cover; border-radius:10px; margin-bottom:10px;">
                    <p style="text-align:left;">${p.description}</p>
                    <p style="text-align:left;"><strong>Seller:</strong> ${p.sellerName}</p>
                    <p style="text-align:left;"><strong>Price:</strong> Rs ${finalPrice}</p>
                    <p style="text-align:left;"><strong>Status:</strong> ${verified}</p>
                `,
                showCancelButton: true,
                confirmButtonText: 'Contact Seller',
                cancelButtonText: 'Close'
            }).then((result) => {
                if (result.isConfirmed) {
                    let message = `Hi! Interested in your product: ${p.name}`;
                    window.open(`https://wa.me/${p.sellerPhone}?text=${encodeURIComponent(message)}`);
                }
            });
        }

        // ==================== ORDER FUNCTIONS ====================
        function showOrderForm(index, type) {
            let p = type === 'store' ? products[index] : clientProducts[index];
            let finalPrice = p.price - (p.price * (p.discount || 0) / 100);
            let whatsapp = type === 'store' ? p.whatsapp : p.sellerPhone;

            Swal.fire({
                title: 'Order Details',
                html: `
                    <div style="text-align:left;">
                        <input type="text" id="orderName" placeholder="Your Name" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:5px;">
                        <input type="text" id="orderPhone" placeholder="Your Phone" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:5px;">
                        <input type="text" id="orderCity" placeholder="City" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:5px;">
                        <textarea id="orderAddress" placeholder="Full Address" rows="2" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:5px;"></textarea>
                        <input type="text" id="orderLandmark" placeholder="Landmark" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:5px;">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Place Order',
                preConfirm: () => {
                    let name = document.getElementById('orderName').value;
                    let phone = document.getElementById('orderPhone').value;
                    let city = document.getElementById('orderCity').value;
                    let address = document.getElementById('orderAddress').value;
                    let landmark = document.getElementById('orderLandmark').value;

                    if (!name || !phone || !city || !address || !landmark) {
                        Swal.showValidationMessage('Please fill all fields');
                        return false;
                    }

                    return { name, phone, city, address, landmark };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    let data = result.value;
                    
                    // WhatsApp message
                    let message = `🛍️ *New Order*\n\n`;
                    message += `*Product:* ${p.name}\n`;
                    message += `*Price:* Rs ${finalPrice}\n\n`;
                    message += `*Customer:*\n`;
                    message += `Name: ${data.name}\n`;
                    message += `Phone: ${data.phone}\n`;
                    message += `City: ${data.city}\n`;
                    message += `Address: ${data.address}\n`;
                    message += `Landmark: ${data.landmark}\n`;

                    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(message)}`);

                    orders.push({
                        product: p.name,
                        price: finalPrice,
                        customer: data,
                        time: new Date().toISOString(),
                        total: finalPrice
                    });
                    
                    saveAll();

                    Swal.fire({
                        icon: 'success',
                        title: 'Order Placed!',
                        text: 'Seller will contact you soon.'
                    });
                }
            });
        }

        // ==================== SEARCH & FILTER ====================
        function searchProduct(query) {
            query = query.toLowerCase();
            if (!query) {
                renderProducts();
                return;
            }

            let filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) ||
                p.description.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        function filterByCategory(category) {
            if (category === 'Client Products') {
                let grid = document.getElementById('productsGrid');
                grid.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1/-1;">Client products are shown below</p>';
                return;
            }

            let filtered = products.filter(p => p.category === category);
            renderProducts(filtered);
        }

        // ==================== CART FUNCTIONS ====================
        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        function viewCart() {
            if (cart.length === 0) {
                Swal.fire({
                    icon: 'info',
                    title: 'Empty Cart',
                    text: 'Your cart is empty'
                });
                return;
            }

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let itemsHtml = cart.map((item, i) => `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; padding:5px; background:#f5f5f5; border-radius:5px;">
                    <img src="${item.images[0]}" style="width:30px; height:30px; border-radius:5px;">
                    <div style="flex:1;">${item.name}</div>
                    <div>Rs ${item.price}</div>
                    <button onclick="removeFromCart(${i})" style="background:#ff4757; color:white; border:none; width:20px; height:20px; border-radius:50%; cursor:pointer;">×</button>
                </div>
            `).join('');

            Swal.fire({
                title: 'Your Cart',
                html: `${itemsHtml}<hr><strong>Total: Rs ${total}</strong>`,
                showCancelButton: true,
                confirmButtonText: 'Checkout',
                confirmButtonColor: '#00b894'
            }).then((result) => {
                if (result.isConfirmed) {
                    checkout();
                }
            });
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveAll();
            viewCart();
        }

        function checkout() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let items = cart.map(item => `• ${item.name}`).join('\n');
            let message = `I want to order:\n${items}\n\nTotal: Rs ${total}`;
            window.open(`https://wa.me/1234567890?text=${encodeURIComponent(message)}`);
        }

        // ==================== SAVE ALL ====================
        function saveAll() {
            localStorage.setItem('gm_products', JSON.stringify(products));
            localStorage.setItem('gm_client_products', JSON.stringify(clientProducts));
            localStorage.setItem('gm_categories', JSON.stringify(categories));
            localStorage.setItem('gm_orders', JSON.stringify(orders));
            localStorage.setItem('gm_cart', JSON.stringify(cart));
            localStorage.setItem('gm_last_update', Date.now().toString());
            
            renderProducts();
            renderClientProducts();
            renderCategories();
            updateCartCount();
        }

        // ==================== LISTEN FOR CHANGES ====================
        window.addEventListener('storage', function(event) {
            if (event.key === 'gm_last_update') {
                products = JSON.parse(localStorage.getItem('gm_products')) || [];
                clientProducts = JSON.parse(localStorage.getItem('gm_client_products')) || [];
                categories = JSON.parse(localStorage.getItem('gm_categories')) || {};
                orders = JSON.parse(localStorage.getItem('gm_orders')) || [];
                cart = JSON.parse(localStorage.getItem('gm_cart')) || [];
                
                renderProducts();
                renderClientProducts();
                renderCategories();
                updateCartCount();
            }
        });

        // ==================== MODAL FUNCTIONS ====================
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // Initialize
        window.onload = init;
    </script>
</body>
</html>
