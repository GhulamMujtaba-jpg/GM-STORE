<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GM Store | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.95); border-radius: 32px; padding: 20px 32px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon { width: 55px; height: 55px; background: linear-gradient(145deg, #ff6b6b, #a29bfe); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 28px; color: white; }
        .logo h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #ff6b6b, #a29bfe, #fdcb6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge { background: linear-gradient(145deg, #ff6b6b, #a29bfe); padding: 10px 28px; border-radius: 50px; color: white; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 22px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.96); border-radius: 28px; padding: 20px; display: flex; align-items: center; gap: 18px; }
        .stat-icon { width: 60px; height: 60px; background: linear-gradient(145deg, #ff6b6b, #a29bfe); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .stat-icon i { font-size: 28px; color: white; }
        .stat-info h3 { font-size: 32px; font-weight: 800; color: #1a1a2e; }
        .stat-info p { font-size: 13px; color: #666; }
        .tabs { display: flex; gap: 14px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.15); border: none; padding: 14px 32px; border-radius: 60px; font-size: 15px; font-weight: 600; cursor: pointer; color: white; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(145deg, #ff6b6b, #a29bfe); color: white; box-shadow: 0 8px 20px rgba(255,107,107,0.4); }
        .panel { display: none; background: rgba(255,255,255,0.96); border-radius: 32px; padding: 32px; margin-bottom: 30px; animation: fadeIn 0.4s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .panel-title { font-size: 24px; font-weight: 800; margin-bottom: 25px; color: #1a1a2e; border-left: 5px solid #ff6b6b; padding-left: 18px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 15px 18px; border-radius: 24px; border: 2px solid #e0e0e0; font-size: 14px; background: white; }
        .form-input:focus { border-color: #ff6b6b; outline: none; }
        .upload-area { border: 3px dashed #ff6b6b; border-radius: 28px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; background: #fff5f5; }
        .upload-area:hover { background: #ffe0e0; }
        .image-preview-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .preview-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; border: 3px solid #ff6b6b; }
        .btn-submit { background: linear-gradient(145deg, #4caf50, #45a049); width: 100%; padding: 16px; border: none; border-radius: 60px; color: white; font-weight: 800; font-size: 16px; cursor: pointer; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .category-card { background: linear-gradient(135deg, #fff, #f8f9fa); border-radius: 28px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .category-info { display: flex; align-items: center; gap: 15px; }
        .category-img { width: 55px; height: 55px; border-radius: 18px; object-fit: cover; border: 2px solid #ff6b6b; }
        .delete-cat { background: #ffebee; border: none; width: 38px; height: 38px; border-radius: 50%; color: #f44336; cursor: pointer; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 28px; overflow: hidden; transition: 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .product-card:hover { transform: translateY(-8px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-body { padding: 20px; position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: #f44336; border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; }
        .request-card { background: white; border-radius: 28px; padding: 22px; margin-bottom: 20px; border: 1px solid #eee; }
        .action-buttons { display: flex; gap: 14px; margin-top: 18px; }
        .btn-action { padding: 10px 24px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .btn-accept { background: #4caf50; color: white; }
        .btn-reject { background: #f44336; color: white; }
        .chats-container { display: flex; gap: 25px; flex-wrap: wrap; }
        .clients-list { width: 300px; background: white; border-radius: 28px; max-height: 550px; overflow-y: auto; }
        .client-item { padding: 18px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 14px; }
        .client-item:hover { background: #f8f9fa; }
        .client-item.active { background: linear-gradient(135deg, #ffe0e0, #fff); border-left: 4px solid #ff6b6b; }
        .client-avatar { width: 50px; height: 50px; background: linear-gradient(145deg, #ff6b6b, #a29bfe); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .chat-area { flex: 1; background: white; border-radius: 28px; display: flex; flex-direction: column; height: 550px; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 25px; background: #fafafa; }
        .message { margin-bottom: 18px; }
        .admin-msg { display: flex; justify-content: flex-start; }
        .client-msg { display: flex; justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 24px; font-size: 14px; }
        .admin-msg .bubble { background: #e8eaf6; color: #1a1a2e; }
        .client-msg .bubble { background: linear-gradient(145deg, #ff6b6b, #a29bfe); color: white; }
        .chat-input { display: flex; gap: 15px; padding: 18px; border-top: 1px solid #eee; background: white; }
        .chat-input input { flex: 1; padding: 14px; border-radius: 50px; border: 2px solid #eee; }
        @media (max-width: 768px) { .chats-container { flex-direction: column; } .clients-list { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-crown"></i></div><h1>GM Store Admin</h1></div>
        <div class="badge"><i class="fas fa-shield-alt"></i> Admin Dashboard</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3 id="totalProducts">0</h3><p>Total Products</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h3 id="pendingCount">0</h3><p>Pending Requests</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-info"><h3 id="categoryCount">0</h3><p>Categories</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3 id="clientCount">0</h3><p>Active Clients</p></div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('products')"><i class="fas fa-store"></i> Products</button>
        <button class="tab-btn" onclick="switchTab('categories')"><i class="fas fa-tags"></i> Categories</button>
        <button class="tab-btn" onclick="switchTab('requests')"><i class="fas fa-inbox"></i> Requests</button>
        <button class="tab-btn" onclick="switchTab('chats')"><i class="fas fa-comments"></i> Client Chats</button>
    </div>

    <!-- Products Panel -->
    <div id="productsPanel" class="panel active-panel">
        <div class="panel-title"><i class="fas fa-plus-circle" style="color:#4caf50"></i> Add New Product</div>
        <div class="form-grid">
            <input type="text" id="productName" class="form-input" placeholder="Product Name *">
            <select id="productCategory" class="form-input"></select>
            <input type="number" id="productPrice" class="form-input" placeholder="Price USD *">
            <input type="number" id="productDiscount" class="form-input" placeholder="Discount %" value="0">
            <input type="number" id="productStock" class="form-input" placeholder="Stock *">
            <input type="text" id="productWhatsapp" class="form-input" placeholder="WhatsApp Number *">
        </div>
        <textarea id="productDesc" rows="3" class="form-input" placeholder="Product Description *"></textarea>
        <div class="upload-area" onclick="document.getElementById('productImages').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Click to upload product images (Max 5)</p>
            <input type="file" id="productImages" multiple accept="image/*" style="display:none">
        </div>
        <div id="imagePreviewContainer" class="image-preview-grid"></div>
        <button class="btn-submit" onclick="addProduct()"><i class="fas fa-save"></i> Add Product</button>
        <div class="panel-title" style="margin-top: 40px;"><i class="fas fa-boxes"></i> All Products</div>
        <div class="products-grid" id="allProductsGrid"></div>
    </div>

    <!-- Categories Panel -->
    <div id="categoriesPanel" class="panel">
        <div class="panel-title"><i class="fas fa-tags"></i> Manage Categories</div>
        <div class="categories-grid" id="categoriesList"></div>
        <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
            <input type="text" id="newCategoryName" class="form-input" placeholder="Category Name" style="flex:2">
            <input type="text" id="categoryImageUrl" class="form-input" placeholder="Image URL" style="flex:1" value="https://cdn-icons-png.flaticon.com/512/3659/3659898.png">
            <button class="btn-action btn-accept" onclick="addCategory()"><i class="fas fa-plus"></i> Add Category</button>
        </div>
    </div>

    <!-- Requests Panel -->
    <div id="requestsPanel" class="panel">
        <div class="panel-title"><i class="fas fa-clock" style="color:#f59e0b"></i> Client Product Requests</div>
        <div id="pendingRequestsList"></div>
    </div>

    <!-- Chats Panel -->
    <div id="chatsPanel" class="panel">
        <div class="panel-title"><i class="fas fa-comments"></i> Client Conversations</div>
        <div class="chats-container">
            <div class="clients-list" id="clientsList"></div>
            <div class="chat-area" id="chatArea">
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#999; flex-direction:column;">
                    <i class="fas fa-comment-dots fa-4x"></i>
                    <p>Select a client to start chatting</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== DATA STORAGE (Shared with client.html) ==========
    let adminProducts = JSON.parse(localStorage.getItem('gm_admin_products')) || [];
    let categories = JSON.parse(localStorage.getItem('gm_categories')) || {};
    let clientRequests = JSON.parse(localStorage.getItem('gm_client_requests')) || [];
    let clientChats = JSON.parse(localStorage.getItem('gm_client_chats')) || {};
    let nextProductId = JSON.parse(localStorage.getItem('gm_next_product_id')) || 100;

    function saveAll() {
        localStorage.setItem('gm_admin_products', JSON.stringify(adminProducts));
        localStorage.setItem('gm_categories', JSON.stringify(categories));
        localStorage.setItem('gm_client_requests', JSON.stringify(clientRequests));
        localStorage.setItem('gm_client_chats', JSON.stringify(clientChats));
        localStorage.setItem('gm_next_product_id', JSON.stringify(nextProductId));
    }

    // Load initial categories if empty
    if (Object.keys(categories).length === 0) {
        categories = {
            "Electronics": "https://cdn-icons-png.flaticon.com/512/3659/3659898.png",
            "Fashion": "https://cdn-icons-png.flaticon.com/512/6174/6174039.png",
            "Home Decor": "https://cdn-icons-png.flaticon.com/512/2543/2543366.png"
        };
        saveAll();
    }

    // Product Images
    let currentProductImages = [];
    document.getElementById('productImages').addEventListener('change', function(e) {
        let files = Array.from(e.target.files);
        if(files.length > 5) { Swal.fire('Error', 'Maximum 5 images allowed', 'error'); this.value=''; return; }
        currentProductImages = [];
        let container = document.getElementById('imagePreviewContainer');
        container.innerHTML = '';
        files.forEach(file => {
            let reader = new FileReader();
            reader.onload = function(ev) {
                currentProductImages.push(ev.target.result);
                let div = document.createElement('div');
                div.style.position = 'relative';
                div.style.display = 'inline-block';
                div.innerHTML = `<img src="${ev.target.result}" class="preview-img"><span class="remove-img" style="position:absolute; background:#f44336; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; margin-left:-18px; margin-top:-10px;" onclick="removeImage(${currentProductImages.length-1})">×</span>`;
                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    });

    function removeImage(index) { currentProductImages.splice(index,1); renderPreview(); }
    function renderPreview() {
        let container = document.getElementById('imagePreviewContainer');
        container.innerHTML = '';
        currentProductImages.forEach((img,idx) => {
            let div = document.createElement('div');
            div.style.position = 'relative';
            div.style.display = 'inline-block';
            div.innerHTML = `<img src="${img}" class="preview-img"><span class="remove-img" style="position:absolute; background:#f44336; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; margin-left:-18px; margin-top:-10px;" onclick="removeImage(${idx})">×</span>`;
            container.appendChild(div);
        });
    }

    function addProduct() {
        let name = document.getElementById('productName').value.trim();
        let category = document.getElementById('productCategory').value;
        let price = parseFloat(document.getElementById('productPrice').value);
        let discount = parseInt(document.getElementById('productDiscount').value) || 0;
        let stock = parseInt(document.getElementById('productStock').value);
        let whatsapp = document.getElementById('productWhatsapp').value.trim();
        let description = document.getElementById('productDesc').value.trim();
        if(!name || !category || !price || !stock || !whatsapp || !description) { Swal.fire('Error', 'Please fill all fields', 'error'); return; }
        if(currentProductImages.length === 0) { Swal.fire('Error', 'Upload at least 1 image', 'error'); return; }
        let finalPrice = price - (price * discount / 100);
        let newProduct = { id: nextProductId++, name, price, discount, finalPrice, stock, whatsapp, category, images: [...currentProductImages], description, addedBy: "admin", sellerName: "GM Official" };
        adminProducts.push(newProduct);
        saveAll();
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productDiscount').value = '0';
        document.getElementById('productStock').value = '';
        document.getElementById('productWhatsapp').value = '';
        document.getElementById('productDesc').value = '';
        currentProductImages = [];
        document.getElementById('imagePreviewContainer').innerHTML = '';
        document.getElementById('productImages').value = '';
        Swal.fire({ icon: 'success', title: 'Product Added!', timer: 2000, showConfirmButton: false });
        updateStats();
        renderAllProducts();
        renderCategorySelect();
    }

    function deleteProduct(id) {
        Swal.fire({ title: 'Delete Product?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#f44336' }).then(res => {
            if(res.isConfirmed) { adminProducts = adminProducts.filter(p => p.id !== id); saveAll(); updateStats(); renderAllProducts(); Swal.fire('Deleted!','','success'); }
        });
    }

    // Categories
    function addCategory() {
        let name = document.getElementById('newCategoryName').value.trim();
        let image = document.getElementById('categoryImageUrl').value.trim();
        if(!name) { Swal.fire('Error', 'Enter category name', 'error'); return; }
        if(categories[name]) { Swal.fire('Error', 'Category already exists', 'error'); return; }
        categories[name] = image || "https://cdn-icons-png.flaticon.com/512/3659/3659898.png";
        saveAll();
        document.getElementById('newCategoryName').value = '';
        renderCategories();
        Swal.fire({ icon: 'success', title: 'Category Added!', timer: 1500 });
    }

    function deleteCategory(catName) {
        Swal.fire({ title: 'Delete Category?', icon: 'warning', showCancelButton: true }).then(res => {
            if(res.isConfirmed) { delete categories[catName]; saveAll(); renderCategories(); Swal.fire('Deleted!','','success'); }
        });
    }

    function renderCategories() {
        let container = document.getElementById('categoriesList');
        container.innerHTML = Object.keys(categories).map(cat => `
            <div class="category-card">
                <div class="category-info">
                    <img src="${categories[cat]}" class="category-img" onerror="this.src='https://placehold.co/55x55'">
                    <span style="font-weight:700">${escapeHtml(cat)}</span>
                </div>
                <button class="delete-cat" onclick="deleteCategory('${escapeHtml(cat)}')"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
        document.getElementById('categoryCount').innerText = Object.keys(categories).length;
        renderCategorySelect();
    }

    function renderCategorySelect() {
        let sel = document.getElementById('productCategory');
        if(sel) sel.innerHTML = Object.keys(categories).map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // Requests
    function renderPendingRequests() {
        let container = document.getElementById('pendingRequestsList');
        let pending = clientRequests.filter(r => r.status === 'pending');
        if(pending.length === 0) { container.innerHTML = '<div style="padding:50px;text-align:center;color:#999"><i class="fas fa-inbox fa-3x"></i><p>No pending requests</p></div>'; return; }
        container.innerHTML = pending.map(req => `
            <div class="request-card">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
                    <strong style="font-size:18px">${escapeHtml(req.product.name)}</strong>
                    <span style="background:#fff3e0;padding:5px 16px;border-radius:30px;color:#f59e0b;font-weight:600">Pending</span>
                </div>
                <div style="display:flex;gap:18px;margin:15px 0;flex-wrap:wrap">
                    <img src="${req.product.images[0]}" width="70" height="70" style="border-radius:18px;object-fit:cover">
                    <div>
                        <strong>Seller:</strong> ${escapeHtml(req.seller.name)}<br>
                        <strong>WhatsApp:</strong> ${req.seller.whatsapp}<br>
                        <strong>Price:</strong> $${req.product.price}<br>
                        <strong>Stock:</strong> ${req.product.stock}
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn-action btn-accept" onclick="handleRequest(${req.id}, 'accept')"><i class="fas fa-check"></i> Accept</button>
                    <button class="btn-action btn-reject" onclick="handleRequest(${req.id}, 'reject')"><i class="fas fa-times"></i> Reject</button>
                </div>
            </div>
        `).join('');
    }

    function handleRequest(id, action) {
        let req = clientRequests.find(r => r.id === id);
        if(req) {
            req.status = action === 'accept' ? 'approved' : 'rejected';
            saveAll();
            updateStats();
            renderPendingRequests();
            Swal.fire({ icon: 'success', title: action === 'accept' ? 'Product Approved!' : 'Request Rejected', timer: 1500 });
        }
    }

    // Products Display
    function renderAllProducts() {
        let container = document.getElementById('allProductsGrid');
        if(adminProducts.length === 0) { container.innerHTML = '<div style="padding:50px;text-align:center;color:#999"><i class="fas fa-box-open fa-3x"></i><p>No products yet</p></div>'; return; }
        container.innerHTML = adminProducts.map(p => `
            <div class="product-card">
                <img src="${p.images[0]}" class="product-img" onerror="this.src='https://placehold.co/400x220'">
                <div class="product-body">
                    <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                    <h4 style="font-size:18px">${escapeHtml(p.name)}</h4>
                    <div style="font-size:24px;font-weight:800;color:#ff6b6b">$${p.finalPrice.toFixed(2)} ${p.discount ? `<span style="font-size:14px;text-decoration:line-through;color:#999">$${p.price}</span>` : ''}</div>
                    <div><i class="fas fa-tag"></i> ${p.category}</div>
                    <div><i class="fas fa-boxes"></i> Stock: ${p.stock}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('totalProducts').innerText = adminProducts.length;
    }

    // Chats
    function getAllClients() {
        let clientsMap = new Map();
        clientRequests.forEach(req => {
            let id = req.seller.whatsapp;
            if(!clientsMap.has(id)) clientsMap.set(id, { name: req.seller.name, whatsapp: req.seller.whatsapp });
        });
        Object.keys(clientChats).forEach(id => {
            if(!clientsMap.has(id)) clientsMap.set(id, { name: id.substring(0,10), whatsapp: id });
        });
        return Array.from(clientsMap.values());
    }

    function renderClientsList() {
        let container = document.getElementById('clientsList');
        let clients = getAllClients();
        document.getElementById('clientCount').innerText = clients.length;
        if(clients.length === 0) { container.innerHTML = '<div style="padding:30px;text-align:center;color:#999">No clients yet</div>'; return; }
        container.innerHTML = clients.map(client => `
            <div class="client-item" onclick="selectClient('${client.whatsapp}', '${escapeHtml(client.name)}')">
                <div class="client-avatar"><i class="fas fa-user"></i></div>
                <div><strong>${escapeHtml(client.name)}</strong><br><small>${client.whatsapp}</small></div>
            </div>
        `).join('');
    }

    let currentSelectedClient = null;
    function selectClient(clientId, clientName) {
        currentSelectedClient = { id: clientId, name: clientName };
        if(!clientChats[clientId]) clientChats[clientId] = [];
        let chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = `
            <div style="padding:18px; background:linear-gradient(145deg,#ff6b6b,#a29bfe); color:white; font-weight:700">
                <i class="fas fa-comment"></i> Chat with ${escapeHtml(clientName)}
            </div>
            <div class="chat-messages" id="chatMessagesArea"></div>
            <div class="chat-input">
                <input type="text" id="adminChatInput" placeholder="Type your message...">
                <button class="btn-action btn-accept" onclick="sendAdminMessage()" style="padding:12px 25px">Send</button>
            </div>
        `;
        renderChatMessages(clientId);
        document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
        if(event && event.target) {
            let closest = event.target.closest('.client-item');
            if(closest) closest.classList.add('active');
        }
    }

    function renderChatMessages(clientId) {
        let container = document.getElementById('chatMessagesArea');
        if(!container) return;
        let messages = clientChats[clientId] || [];
        container.innerHTML = messages.map(msg => `
            <div class="message ${msg.sender === 'admin' ? 'admin-msg' : 'client-msg'}">
                <div class="bubble">
                    <strong>${msg.sender === 'admin' ? 'Admin' : msg.senderName}:</strong> ${escapeHtml(msg.message)}<br>
                    <small style="font-size:9px;opacity:0.6">${msg.time}</small>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    function sendAdminMessage() {
        if(!currentSelectedClient) { Swal.fire('Error', 'Select a client first', 'error'); return; }
        let msg = document.getElementById('adminChatInput')?.value.trim();
        if(!msg) return;
        if(!clientChats[currentSelectedClient.id]) clientChats[currentSelectedClient.id] = [];
        clientChats[currentSelectedClient.id].push({ sender: 'admin', senderName: 'Admin', message: msg, time: new Date().toLocaleString() });
        saveAll();
        renderChatMessages(currentSelectedClient.id);
        document.getElementById('adminChatInput').value = '';
    }

    function updateStats() {
        document.getElementById('totalProducts').innerText = adminProducts.length;
        document.getElementById('pendingCount').innerText = clientRequests.filter(r => r.status === 'pending').length;
        document.getElementById('categoryCount').innerText = Object.keys(categories).length;
        document.getElementById('clientCount').innerText = getAllClients().length;
    }

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'products') { document.getElementById('productsPanel').classList.add('active-panel'); document.querySelectorAll('.tab-btn')[0].classList.add('active'); renderAllProducts(); }
        else if(tab === 'categories') { document.getElementById('categoriesPanel').classList.add('active-panel'); document.querySelectorAll('.tab-btn')[1].classList.add('active'); renderCategories(); }
        else if(tab === 'requests') { document.getElementById('requestsPanel').classList.add('active-panel'); document.querySelectorAll('.tab-btn')[2].classList.add('active'); renderPendingRequests(); }
        else if(tab === 'chats') { document.getElementById('chatsPanel').classList.add('active-panel'); document.querySelectorAll('.tab-btn')[3].classList.add('active'); renderClientsList(); }
    }

    function escapeHtml(str) { if(!str) return ''; let d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

    // Initial render
    renderCategories();
    renderAllProducts();
    renderPendingRequests();
    renderClientsList();
    updateStats();
</script>
</body>
</html>
