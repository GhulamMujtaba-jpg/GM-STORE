<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
.container{padding:20px;max-width:1200px;margin:auto}

/* LOGIN */
.login{max-width:400px;margin:100px auto;background:#fff;color:#000;padding:30px;border-radius:20px}
input,select,textarea{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:1px solid #ccc}

/* BUTTONS */
button{padding:10px 15px;border:none;border-radius:10px;cursor:pointer}
.primary{background:#6c5ce7;color:#fff}
.danger{background:#e74c3c;color:#fff}
.success{background:#2ecc71;color:#fff}

/* DASHBOARD */
.dashboard{display:none}
.header{display:flex;justify-content:space-between;align-items:center;background:#222;padding:15px;border-radius:10px;margin-bottom:20px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.card{background:#222;padding:15px;border-radius:10px;margin-top:15px}
img{max-width:80px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="dashboard container">

<div class="header">
<h2>GM Store Admin</h2>
<button class="danger" onclick="logout()">Logout</button>
</div>

<!-- PRODUCT FORM -->
<div class="card">
<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="discount" placeholder="Discount %">
<input id="stock" placeholder="Stock">
<input id="whatsapp" placeholder="WhatsApp Number">
<textarea id="desc" placeholder="Description"></textarea>

<select id="category"></select>

<input type="file" id="img" multiple>

<button class="success" onclick="addProduct()">Save Product</button>
</div>

<!-- PRODUCTS -->
<div class="card">
<h3>Products</h3>
<div id="products"></div>
</div>

</div>

<script>
const ADMIN_EMAIL="mujtabarehman30@gmail.com";
const ADMIN_PASS="Sahibzada@6060";

let products=JSON.parse(localStorage.getItem("products"))||[];
let categories=JSON.parse(localStorage.getItem("cats"))||{"Default":"General"};
let chat=JSON.parse(localStorage.getItem("chat"))||{};
let requests=JSON.parse(localStorage.getItem("req"))||[];

function saveAll(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cats",JSON.stringify(categories));
localStorage.setItem("chat",JSON.stringify(chat));
localStorage.setItem("req",JSON.stringify(requests));
render();
}

function login(){
let e=document.getElementById("email").value;
let p=document.getElementById("pass").value;

if(e===ADMIN_EMAIL && p===ADMIN_PASS){
document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="block";
render();
}else{
Swal.fire("Error","Wrong login","error");
}
}

function logout(){location.reload();}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let discount=document.getElementById("discount").value||0;
let stock=document.getElementById("stock").value;
let whatsapp=document.getElementById("whatsapp").value;
let desc=document.getElementById("desc").value;
let cat=document.getElementById("category").value;

let files=document.getElementById("img").files;
let images=[];

for(let i=0;i<files.length;i++){
let r=new FileReader();
r.onload=function(e){
images.push(e.target.result);

if(images.length===files.length){
products.push({
id:Date.now(),
name,price,discount,stock,whatsapp,desc,category:cat,images
});
saveAll();
}
}
r.readAsDataURL(files[i]);
}
}

function render(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>Price: ${p.price}</p>
<p>Discount: ${p.discount}%</p>
<p>${p.desc}</p>
<p>WhatsApp: ${p.whatsapp}</p>
<div>${(p.images||[]).map(i=>`<img src="${i}">`).join("")}</div>
</div>
`;
});
document.getElementById("products").innerHTML=html;

let c=document.getElementById("category");
if(c){
c.innerHTML=Object.keys(categories).map(k=>`<option>${k}</option>`).join("");
}
}

if(localStorage.getItem("login")=="true"){
document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="block";
}
</script>

</body>
</html>
