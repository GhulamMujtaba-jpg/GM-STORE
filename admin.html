<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GM Store Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:20px}

/* ===== LOGIN ===== */
.login-container{max-width:420px;margin:80px auto;background:#fff;padding:40px;border-radius:30px}
.login-input{width:100%;padding:12px;margin:10px 0;border-radius:20px;border:1px solid #ddd}
.login-btn{width:100%;padding:12px;background:#6c5ce7;color:#fff;border:none;border-radius:20px}

/* ===== DASHBOARD ===== */
.admin-dashboard{display:none}
.admin-dashboard.active{display:block}

.container{max-width:1200px;margin:auto}

.header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:20px;border-radius:20px;margin-bottom:20px}

.tabs button{padding:10px 20px;border:none;border-radius:20px;margin:5px;cursor:pointer}
.tab-btn.active{background:#6c5ce7;color:#fff}

.panel{display:none;background:#fff;padding:20px;border-radius:20px;margin-top:20px}
.panel.active-panel{display:block}

.form-input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd}

.btn-submit{padding:10px 20px;background:#00b894;color:#fff;border:none;border-radius:20px}

.product-card{background:#f8f8f8;padding:15px;border-radius:15px;margin:10px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer" class="login-container">
<h2>Admin Login</h2>
<input id="loginEmail" class="login-input" value="mujtabarehman30@gmail.com">
<input id="loginPassword" type="password" class="login-input" placeholder="Password">
<button class="login-btn" onclick="doLogin()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="adminDashboard" class="admin-dashboard">
<div class="container">

<div class="header">
<h2>GM Store Admin</h2>
<button onclick="doLogout()">Logout</button>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('products')">Products</button>
</div>

<!-- PRODUCTS -->
<div id="productsPanel" class="panel active-panel">

<h3>Add Product</h3>

<input id="productName" class="form-input" placeholder="Name">
<input id="productPrice" class="form-input" placeholder="Price">

<button class="btn-submit" onclick="saveProduct()">Save</button>

<h3>All Products</h3>
<div id="allProducts"></div>

</div>

</div>
</div>

<script>
const ADMIN_EMAIL = "mujtabarehman30@gmail.com";
const ADMIN_PASSWORD = "Sahibzada@6060";

let products = JSON.parse(localStorage.getItem("products")) || [];

function doLogin(){
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPassword").value;

if(email===ADMIN_EMAIL && pass===ADMIN_PASSWORD){
localStorage.setItem("login","true");
document.getElementById("loginContainer").style.display="none";
document.getElementById("adminDashboard").classList.add("active");
loadProducts();
}else{
Swal.fire("Error","Wrong login","error");
}
}

function doLogout(){
localStorage.removeItem("login");
location.reload();
}

function switchTab(){
document.querySelectorAll(".panel")[0].classList.add("active-panel");
}

function saveProduct(){
let name=document.getElementById("productName").value;
let price=document.getElementById("productPrice").value;

if(!name||!price){
Swal.fire("Error","Fill all fields","error");
return;
}

products.push({name,price});
localStorage.setItem("products",JSON.stringify(products));

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";

loadProducts();
}

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="product-card">
<h4>${p.name}</h4>
<p>Rs ${p.price}</p>
</div>
`;
});
document.getElementById("allProducts").innerHTML=html;
}

if(localStorage.getItem("login")==="true"){
document.getElementById("loginContainer").style.display="none";
document.getElementById("adminDashboard").classList.add("active");
loadProducts();
}
</script>

</body>
</html>
