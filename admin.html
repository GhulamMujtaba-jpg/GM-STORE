<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Store Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root { --primary: #ff6b6b; --secondary: #a29bfe; --gradient: linear-gradient(135deg, #ff6b6b, #a29bfe); }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; padding: 20px; }
        
        .login-container { max-width: 450px; margin: 80px auto; background: rgba(255,255,255,0.95); border-radius: 40px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .login-container h2 { text-align: center; margin-bottom: 30px; font-size: 28px; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 30px; border: 2px solid #eee; font-size: 16px; }
        .login-btn { width: 100%; padding: 15px; background: var(--gradient); border: none; border-radius: 30px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .login-btn:hover { transform: scale(1.02); }
        
        .admin-dashboard { display: none; }
        .admin-dashboard.active { display: block; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.95); border-radius: 32px; padding: 20px 32px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon { width: 55px; height: 55px; background: var(--gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 28px; color: white; }
        .logo h1 { font-size: 28px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logout-btn { background: #f44336; color: white; padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 22px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.96); border-radius: 28px; padding: 20px; display: flex; align-items: center; gap: 18px; }
        .stat-icon { width: 60px; height: 60px; background: var(--gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .stat-icon i { font-size: 28px; color: white; }
        .stat-info h3 { font-size: 32px; font-weight: 800; }
        
        .tabs { display: flex; gap: 14px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.15); border: none; padding: 14px 32px; border-radius: 60px; font-size: 15px; font-weight: 600; cursor: pointer; color: white; backdrop-filter: blur(10px); transition: 0.3s; }
        .tab-btn.active { background: var(--gradient); color: white; }
        
        .panel { display: none; background: rgba(255,255,255,0.96); border-radius: 32px; padding: 32px; margin-bottom: 30px; animation: fadeIn 0.4s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .panel-title { font-size: 24px; font-weight: 800; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 18px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 15px 18px; border-radius: 24px; border: 2px solid #e0e0e0; font-size: 14px; }
        .form-input:focus { border-color: var(--primary); outline: none; }
        
        .upload-area { border: 3px dashed var(--primary); border-radius: 28px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; background: #fff5f5; transition: 0.3s; }
        .upload-area:hover { background: #ffe0e0; }
        
        .image-preview-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .preview-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; border: 3px solid var(--primary); }
        
        .btn-submit { background: linear-gradient(145deg, #4caf50, #45a049); width: 100%; padding: 16px; border: none; border-radius: 60px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.02); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 28px; overflow: hidden; transition: 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .product-card:hover { transform: translateY(-8px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }
        .product-body { padding: 20px; }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn, .delete-btn { flex: 1; padding: 8px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .edit-btn { background: #ffc107; color: #333; }
        .delete-btn { background: #f44336; color: white; }
        
        .loading { text-align: center; padding: 20px; }
        .loading i { font-size: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginContainer" class="login-container">
    <h2><i class="fas fa-crown"></i> Admin Login</h2>
    <input type="email" id="loginEmail" class="login-input" placeholder="Email" value="mujtabarehman30@gmail.com">
    <input type="password" id="loginPassword" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" class="admin-dashboard">
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-crown"></i></div><h1>GM Store Admin</h1></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3 id="totalProducts">0</h3><p>Total Products</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-info"><h3 id="categoryCount">0</h3><p>Categories</p></div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('products')"><i class="fas fa-store"></i> Products</button>
        <button class="tab-btn" onclick="switchTab('categories')"><i class="fas fa-tags"></i> Categories</button>
    </div>

    <!-- PRODUCTS PANEL -->
    <div id="productsPanel" class="panel active-panel">
        <div class="panel-title"><i class="fas fa-plus-circle" style="color:#4caf50"></i> Add / Edit Product</div>
        <div class="form-grid">
            <input type="text" id="productName" class="form-input" placeholder="Product Name *">
            <select id="productCategory" class="form-input"></select>
            <input type="number" id="productPrice" class="form-input" placeholder="Price *">
            <input type="number" id="productDiscount" class="form-input" placeholder="Discount %" value="0">
            <input type="number" id="productStock" class="form-input" placeholder="Stock *">
            <input type="text" id="productWhatsapp" class="form-input" placeholder="WhatsApp Number *">
        </div>
        <textarea id="productDesc" rows="3" class="form-input" placeholder="Product Description *"></textarea>
        
        <div class="upload-area" onclick="document.getElementById('productImages').click()">
            <i class="fas fa-cloud-upload-alt fa-2x"></i>
            <p><strong>Click to upload product images</strong> (Max 5)</p>
            <input type="file" id="productImages" multiple accept="image/*" style="display:none">
        </div>
        <div id="imagePreviewContainer" class="image-preview-grid"></div>
        <button class="btn-submit" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
        
        <div class="panel-title" style="margin-top: 40px;"><i class="fas fa-boxes"></i> All Products</div>
        <div class="products-grid" id="allProductsGrid"></div>
    </div>

    <!-- CATEGORIES PANEL -->
    <div id="categoriesPanel" class="panel">
        <div class="panel-title"><i class="fas fa-tags"></i> Manage Categories</div>
        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <input type="text" id="newCategoryName" class="form-input" placeholder="Category Name" style="flex:1; min-width:200px">
            <button class="btn-submit" onclick="addCategory()" style="background:var(--primary); flex:0 0 auto; padding:15px 30px;"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div id="categoriesList"></div>
    </div>

</div>
</div>

<script>
    const API_BASE = '/api'; // Update this to your backend API URL
    const ADMIN_EMAIL = "mujtabarehman30@gmail.com";
    const ADMIN_PASSWORD = "Sahibzada@6060";
    
    let adminToken = null;
    let adminProducts = [];
    let categories = [];
    let currentProductImages = [];
    let editingProductId = null;

    async function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            adminToken = 'authenticated';
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminDashboard').classList.add('active');
            loadAdminData();
        } else {
            Swal.fire('Error', 'Invalid email or password!', 'error');
        }
    }

    function doLogout() {
        adminToken = null;
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('adminDashboard').classList.remove('active');
        document.getElementById('loginPassword').value = '';
    }

    async function loadAdminData() {
        try {
            // Load categories
            const catRes = await fetch(`${API_BASE}/categories`);
            if(catRes.ok) {
                categories = await catRes.json();
                renderCategories();
                renderCategorySelect();
            }
            
            // Load products
            const prodRes = await fetch(`${API_BASE}/products`);
            if(prodRes.ok) {
                adminProducts = await prodRes.json();
                renderAllProducts();
            }
            
            updateStats();
        } catch(err) {
            console.log('API not connected - running in demo mode');
            // Demo data
            categories = ['Electronics', 'Fashion', 'Home Decor'];
            adminProducts = [];
            renderCategories();
            renderCategorySelect();
            renderAllProducts();
            updateStats();
        }
    }

    async function saveProduct() {
        const name = document.getElementById('productName').value.trim();
        const category = document.getElementById('productCategory').value;
        const price = parseFloat(document.getElementById('productPrice').value);
        const discount = parseInt(document.getElementById('productDiscount').value) || 0;
        const stock = parseInt(document.getElementById('productStock').value);
        const whatsapp = document.getElementById('productWhatsapp').value.trim();
        const description = document.getElementById('productDesc').value.trim();

        if(!name || !category || !price || !stock || !whatsapp || !description) {
            Swal.fire('Error', 'Fill all fields', 'error');
            return;
        }

        if(currentProductImages.length === 0 && !editingProductId) {
            Swal.fire('Error', 'Upload at least 1 image', 'error');
            return;
        }

        const finalPrice = price - (price * discount / 100);
        const productData = {
            name, category, price, discount, finalPrice, stock, whatsapp, description,
            images: currentProductImages
        };

        try {
            let res;
            if(editingProductId) {
                res = await fetch(`${API_BASE}/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                Swal.fire({ icon: 'success', title: 'Product Updated!', timer: 1500 });
            } else {
                res = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                Swal.fire({ icon: 'success', title: 'Product Added!', timer: 1500 });
            }

            if(res.ok) {
                clearProductForm();
                loadAdminData();
            }
        } catch(err) {
            Swal.fire('Error', 'Failed to save product', 'error');
        }
    }

    async function deleteProduct(id) {
        Swal.fire({ title: 'Delete Product?', icon: 'warning', showCancelButton: true }).then(async res => {
            if(res.isConfirmed) {
                try {
                    await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                    loadAdminData();
                    Swal.fire('Deleted!', '', 'success');
                } catch(err) {
                    Swal.fire('Error', 'Failed to delete', 'error');
                }
            }
        });
    }

    function editProduct(id) {
        const product = adminProducts.find(p => p.id === id);
        if(product) {
            editingProductId = id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDiscount').value = product.discount;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productWhatsapp').value = product.whatsapp;
            document.getElementById('productDesc').value = product.description;
            currentProductImages = [...(product.images || [])];
            renderProductPreview();
            switchTab('products');
        }
    }

    function clearProductForm() {
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productDiscount').value = '0';
        document.getElementById('productStock').value = '';
        document.getElementById('productWhatsapp').value = '';
        document.getElementById('productDesc').value = '';
        currentProductImages = [];
        renderProductPreview();
        editingProductId = null;
    }

    document.getElementById('productImages').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if(files.length > 5) {
            Swal.fire('Error', 'Max 5 images', 'error');
            this.value = '';
            return;
        }
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentProductImages.push(ev.target.result);
                renderProductPreview();
            };
            reader.readAsDataURL(file);
        });
    });

    function renderProductPreview() {
        const container = document.getElementById('imagePreviewContainer');
        container.innerHTML = '';
        currentProductImages.forEach((img, idx) => {
            const div = document.createElement('div');
            div.style.position = 'relative';
            div.style.display = 'inline-block';
            div.innerHTML = `<img src="${img}" class="preview-img"><span onclick="removeProductImage(${idx})" style="position:absolute; top:-8px; right:-8px; background:#f44336; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-times"></i></span>`;
            container.appendChild(div);
        });
    }

    function removeProductImage(idx) {
        currentProductImages.splice(idx, 1);
        renderProductPreview();
    }

    function renderAllProducts() {
        const container = document.getElementById('allProductsGrid');
        if(adminProducts.length === 0) {
            container.innerHTML = '<div style="padding:50px;text-align:center">No products added yet</div>';
            return;
        }
        container.innerHTML = adminProducts.map(p => `
            <div class="product-card">
                <img src="${p.images?.[0] || 'https://via.placeholder.com/320x220'}" class="product-img">
                <div class="product-body">
                    <h3>${p.name}</h3>
                    <p>Rs. ${p.price}</p>
                    <p style="font-size:12px; color:#999;">Stock: ${p.stock}</p>
                    <div class="product-actions">
                        <button class="edit-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById('totalProducts').innerText = adminProducts.length;
    }

    async function addCategory() {
        const name = document.getElementById('newCategoryName').value.trim();
        if(!name) {
            Swal.fire('Error', 'Enter category name', 'error');
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/categories`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            
            if(res.ok) {
                document.getElementById('newCategoryName').value = '';
                loadAdminData();
                Swal.fire({ icon: 'success', title: 'Category Added!', timer: 1500 });
            }
        } catch(err) {
            Swal.fire('Error', 'Failed to add category', 'error');
        }
    }

    async function deleteCategory(name) {
        Swal.fire({ title: 'Delete Category?', icon: 'warning', showCancelButton: true }).then(async res => {
            if(res.isConfirmed) {
                try {
                    await fetch(`${API_BASE}/categories/${name}`, { method: 'DELETE' });
                    loadAdminData();
                    Swal.fire('Deleted!', '', 'success');
                } catch(err) {
                    Swal.fire('Error', 'Failed to delete', 'error');
                }
            }
        });
    }

    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if(categories.length === 0) {
            container.innerHTML = '<div style="padding:20px;text-align:center">No categories</div>';
            return;
        }
        container.innerHTML = categories.map(cat => `
            <div style="background:#f5f5f5; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${typeof cat === 'string' ? cat : cat.name}</span>
                <button class="delete-btn" onclick="deleteCategory('${typeof cat === 'string' ? cat : cat.name}')" style="flex:0; padding:6px 12px;"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
        document.getElementById('categoryCount').innerText = categories.length;
    }

    function renderCategorySelect() {
        const sel = document.getElementById('productCategory');
        if(sel) {
            const catNames = categories.map(c => typeof c === 'string' ? c : c.name);
            sel.innerHTML = catNames.map(c => `<option value="${c}">${c}</option>`).join('');
        }
    }

    function updateStats() {
        document.getElementById('totalProducts').innerText = adminProducts.length;
        document.getElementById('categoryCount').innerText = categories.length;
    }

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if(tab === 'products') {
            document.getElementById('productsPanel').classList.add('active-panel');
        } else {
            document.getElementById('categoriesPanel').classList.add('active-panel');
        }
        
        event.target.classList.add('active');
    }
</script>

</body>
</html>
